<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЛенОптика</title>
    <link rel="shortcut icon" href="ico/logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <div class="container">
                <div class="header__inner">
                    <div class="header__logo-box">
                        <img src="ico/logo.svg" alt="logo">
                        <span>ЛенОптика</span>
                    </div>
                    <nav class="header__nav">
                        <ul class="header__nav-list">
                            <li class="header__nav-item">Главная</li>
                            <li class="header__nav-item">Каталог</li>
                            <li class="header__nav-item">Новинки</li>
                            <li class="header__nav-item">Акции</li>
                            <li class="header__nav-item">Запись к врачу</li>
                            <li class="header__nav-item">Контакты</li>
                        </ul>
                    </nav>
                    <div class="header__button-box">
                        <a class="header__buttons-btn">Войти</a>
                        <a class="header__buttons-btn">Корзина <span>(0)</span></a>
                    </div>
                </div>
            </div>
        </header>
    </div>
</body>
</html>

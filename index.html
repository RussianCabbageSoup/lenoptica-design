<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЛенОптика</title>
    <link rel="shortcut icon" href="ico/logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <div class="wrapper">
        <header class="header">
            <div class="container">
                <div class="header__inner">
                    <a class="header__logo-box" href="#">
                        <img src="ico/logo.svg" alt="logo">
                        <span>ЛенОптика</span>
                    </a>
                    <nav class="header__nav">
                        <ul class="header__nav-list">
                            <a class="header__nav-link" href="#">             
                                <li class="header__nav-item">Главная</li>
                            </a>
                            <a class="header__nav-link" href="#">
                                <li class="header__nav-item">Каталог</li>
                            </a>
                            <a class="header__nav-link" href="#">
                                <li class="header__nav-item">Новинки</li>
                            </a>
                            <a class="header__nav-link" href="#">
                                <li class="header__nav-item">Акции</li>
                            </a>
                            <a class="header__nav-link" href="#">
                                <li class="header__nav-item">Запись к врачу</li>
                            </a>
                            <a class="header__nav-link" href="#">
                                <li class="header__nav-item">Контакты</li>
                            </a>
                        </ul>
                    </nav>
                    <div class="header__button-box">
                        <a class="header__buttons-btn" href="#">Войти</a>
                        <a class="header__buttons-btn" href="#">Корзина <span>(0)</span></a>
                    </div>
                </div>
            </div>
        </header>
        <main class="main">
            <section class="face">
                <div class="face__inner">
                    <div class="face__banner">
                        <div class="face__banner-content">
                            <div class="banner__text">
                                <h2 class="banner__title">Сморти на мир кристально чисто</h2>
                                <p class="banner__subtitle">Оправы специально для тебя</p>
                            </div>
                            <a class="banner__btn" href="#">Смотреть каталог</a>       <!--      Баннер как img сделать  -->                        </div>
                    </div>
                    <div class="container">
                        <div class="face__slider">
                            <div class="slide"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    </div>
</body>

</html>
